name: CI/CD Docker Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️ Checkout repo
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️ Copy app files to Azure VM
    - name: Copy app files to Azure VM
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "app/*"
        target: "/home/azureuser/docker-app"

    # 3 Deploy Docker container on Azure VM
    - name: Deploy Docker container on Azure VM
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Stop old container if running
          docker stop caone-container || true
          docker rm caone-container || true

          # Go to app folder
          cd /home/azureuser/docker-app

          # Build Docker image
          docker build -t caone-web .

          # Run container
          docker run -d -p 80:80 --name caone-container caone-web
