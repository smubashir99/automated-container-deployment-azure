name: CI/CD Docker Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️ Checkout repository
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️ Set up SSH key
    - name: Set up SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/github_action_key
        chmod 600 ~/.ssh/github_action_key
      shell: bash

    # 3️ Test SSH connection (optional, will fail workflow if SSH not working)
    - name: Test SSH connection
      run: ssh -i ~/.ssh/github_action_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "echo SSH connection successful"
      shell: bash

    # 4️ Copy app files to Azure VM
    - name: Copy app files to Azure VM
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "app/*"
        target: "/home/azureuser/docker-app"
        strip_components: 0

    # 5️ Deploy Docker container on Azure VM
    - name: Deploy Docker container on Azure VM
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          echo "Stopping old container if exists..."
          docker stop caone-container || true
          docker rm caone-container || true

          echo "Navigating to app directory..."
          cd /home/azureuser/docker-app

          echo "Building Docker image..."
          docker build -t caone-web .

          echo "Running Docker container..."
          docker run -d -p 80:80 --name caone-container caone-web

          echo "Deployment finished successfully!"
